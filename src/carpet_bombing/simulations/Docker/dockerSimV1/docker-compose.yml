networks: #Définition du réseau Docker pour l'attaque
  attack_net:
    name: cb_attack_net
    driver: bridge #bridge est le driver par défaut pour les réseaux Docker, il permet aux conteneurs de communiquer entre eux sur le même hôte.
    ipam:
      config:
        - subnet:10.10.1.0/24 #Définition de la plage d'adresses IP pour le réseau Docker, ici

  transit_net:
    name: cb_transit_net
    driver: bridge
    ipam:
      config:
        - subnet: 10.10.2.0/24

  victim_net:
    name: cb_victim_net
    driver: bridge
    ipam:
      config:
        - subnet: 10.10.3.0/24