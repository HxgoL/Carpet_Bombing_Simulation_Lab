services:

  attacker:
    build: ./attacker
    container_name: cb_attacker
    networks:
      attack_net:
        ipv4_address: 10.10.1.10
      volumes: # pour enregistrer, partager un dossier entre : ta machine réelle et le conteneur Docker
        - ./data:app/data #le : c'est la séparation entre le chemin de ta machine réelle et le chemin dans le conteneur Docker
    environment: # sert à envoyer des variables d’environnement Linux dans le conteneur.
      VICTIM_COUNT: ${VICTIM_COUNT:-16}
      VICTIM_START_IP: ${VICTIM_START_IP:-10.10.3.101}
    cap_add:
      - NET_RAW
      - NET_ADMIN

  isp_router:
    build: ./router
    container_name: cb_isp_router
    networks:
      - attack_net:
        ipv4_address: 10.10.1.1
      - transit_net:
        ipv4_address: 10.10.2.1
    cap_add:
      - NET_ADMIN
      - NET_RAW
    sysctls:
      - net.ipv4.ip_forward=1 #permet de faire du routage entre les réseaux Docker

  edge_router:
    build: ./router
    container_name: cb_edge_router
    networks:
      - transit_net:
        ipv4_address: 10.10.2.2
      - victim_net:
        ipv4_address: 10.10.3.1
    volumes:
      - ./data:/app/data
    cap_add:
      - NET_ADMIN
      - NET_RAW
    sysctls:
      - net.ipv4.ip_forward=1  

  monitor:
    build: ./monitor
    container_name: cb_monitor
    networks:
      victim_net:
        ipv4_address: 10.10.3.20
    volumes:
      - ./data:/app/data
    cap_add:
      - NET_ADMIN
      - NET_RAW    

# ON définit les victimes sur leur réseau
  victim01: &victim
